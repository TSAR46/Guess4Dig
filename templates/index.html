<!DOCTYPE html>
<html>
<head>
    <title>💕 Love Guess Duel 💕</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass-card {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .active-player {
            border: 3px solid #ff4da6;
            box-shadow: 0 0 20px rgba(255,77,166,0.7);
        }

        .btn-cute {
            background: #ff4da6;
            border-radius: 30px;
            color: white;
            font-weight: bold;
        }

        .history-box {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .guess-item {
            background: rgba(255,255,255,0.5);
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 6px;
        }

        #status {
            font-size: 18px;
            font-weight: bold;
        }

        #secretDisplay {
            font-size: 20px;
            font-weight: bold;
            margin-top: 8px;
            color: #fff;
        }
    </style>
</head>

<body class="d-flex flex-column align-items-center justify-content-center">

<div class="container text-center">

    <h2 class="text-white mb-3">💖 Secret Love Duel 💖</h2>

    <div id="status" class="text-dark mb-2">Connecting...</div>
    <div id="secretDisplay">Your Secret: ----</div>

    <div class="row g-4 mt-3">

        <div class="col-md-6">
            <div id="player1Card" class="glass-card">
                <h4>👑 Player 1</h4>
                <input type="text" id="input1" maxlength="4" class="form-control mt-3">
                <button class="btn btn-cute mt-2" onclick="sendGuess('input1')">Guess 💌</button>
                <div id="history1" class="history-box"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div id="player2Card" class="glass-card">
                <h4>🌸 Player 2</h4>
                <input type="text" id="input2" maxlength="4" class="form-control mt-3">
                <button class="btn btn-cute mt-2" onclick="sendGuess('input2')">Guess 💌</button>
                <div id="history2" class="history-box"></div>
            </div>
        </div>

    </div>
</div>

<!-- Result Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <h3 id="resultText"></h3>
      <button class="btn btn-cute mt-3" onclick="restartGame()">OK 💖</button>
    </div>
  </div>
</div>

<script>
    const socket = io();
    const status = document.getElementById("status");
    const secretDisplay = document.getElementById("secretDisplay");

    let player1Id = null;
    let player2Id = null;

    socket.on("waiting", () => {
        status.innerText = "Waiting for your partner 💕";
    });

    socket.on("yourSecret", (data) => {
        secretDisplay.innerText = "Your Secret: " + data.secret;
    });

    socket.on("startGame", (data) => {
        player1Id = data.player1;
        player2Id = data.player2;
        setTurn(data.currentTurn);
    });

    socket.on("guessResult", (data) => {
        const div = document.createElement("div");
        div.className = "guess-item";
        div.innerText = `${data.guess} → ${data.correctCount} correct 💖`;

        if (data.player === player1Id) {
            document.getElementById("history1").appendChild(div);
        } else {
            document.getElementById("history2").appendChild(div);
        }
    });

    socket.on("turnChanged", (data) => {
        setTurn(data.currentTurn);
    });

    socket.on("gameOver", (data) => {
        const modal = new bootstrap.Modal(document.getElementById('resultModal'));

        if (data.winner === socket.id) {
            document.getElementById("resultText").innerText = "🎉 You Win!!! 💖";
            confetti({ particleCount: 200, spread: 120 });
        } else {
            document.getElementById("resultText").innerText = "💔 Better luck next time 💕";
        }

        modal.show();
        disableInputs();
    });

    function setTurn(currentTurn) {
        const isMyTurn = socket.id === currentTurn;

        status.innerText = isMyTurn ? "💘 Your Turn" : "⏳ Opponent's Turn";

        document.getElementById("input1").disabled =
            !(isMyTurn && socket.id === player1Id);

        document.getElementById("input2").disabled =
            !(isMyTurn && socket.id === player2Id);
    }

    function disableInputs() {
        document.getElementById("input1").disabled = true;
        document.getElementById("input2").disabled = true;
    }

    function sendGuess(id) {
        const input = document.getElementById(id);
        const guess = input.value;

        if (!/^\d{4}$/.test(guess)) {
            alert("Enter a valid 4-digit number 💕");
            return;
        }

        socket.emit("makeGuess", { guess });
        input.value = "";
    }

    function restartGame() {
        socket.emit("restartGame");

        document.getElementById("history1").innerHTML = "";
        document.getElementById("history2").innerHTML = "";

        const modal = bootstrap.Modal.getInstance(
            document.getElementById('resultModal')
        );
        modal.hide();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
