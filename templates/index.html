<!DOCTYPE html>
<html>
<head>
    <title>2 Player Guess Game</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        #status {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            flex: 1;
            display: flex;
        }

        .player {
            flex: 1;
            padding: 40px;
            text-align: center;
        }

        .divider {
            width: 3px;
            background-color: black;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 120px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }

        .history {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .guess {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<h2>4 Digit Guess Game</h2>
<p id="status">Connecting...</p>

<div class="container">
    
    <!-- Player 1 Section -->
    <div class="player" id="player1">
        <h3>Player 1</h3>
        <input type="text" id="guessInput1" maxlength="4" placeholder="Enter guess">
        <button onclick="sendGuess('guessInput1')">Submit</button>

        <div class="history" id="history1"></div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Player 2 Section -->
    <div class="player" id="player2">
        <h3>Player 2</h3>
        <input type="text" id="guessInput2" maxlength="4" placeholder="Enter guess">
        <button onclick="sendGuess('guessInput2')">Submit</button>

        <div class="history" id="history2"></div>
    </div>

</div>

<script>
    const socket = io();
    const status = document.getElementById("status");

    socket.on("waiting", () => {
        status.innerText = "Waiting for another player...";
    });

    socket.on("startGame", () => {
        status.innerText = "Game Started!";
    });

    socket.on("guessResult", (data) => {

        const message = 
            `Guessed ${data.guess} → ${data.correctCount} digits correct`;

        // Show guess on both sides
        const div1 = document.createElement("div");
        div1.className = "guess";
        div1.innerText = message;

        const div2 = document.createElement("div");
        div2.className = "guess";
        div2.innerText = message;

        document.getElementById("history1").appendChild(div1);
        document.getElementById("history2").appendChild(div2);
    });

    socket.on("gameOver", (data) => {
        if (data.winner === socket.id) {
            status.innerText = "🎉 You Win!";
        } else {
            status.innerText = "😢 You Lose!";
        }
    });

    function sendGuess(inputId) {

        const input = document.getElementById(inputId);
        const guess = input.value;

        if (!/^\d{4}$/.test(guess)) {
            alert("Enter valid 4-digit number");
            return;
        }

        socket.emit("makeGuess", { guess });
        input.value = "";
    }
</script>

</body>
</html>
