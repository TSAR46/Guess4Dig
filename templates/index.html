<!DOCTYPE html>
<html>
<head>
    <title>Guess4Dig</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            font-size: 32px;
        }

        #status {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .container {
            flex: 1;
            display: flex;
        }

        .player {
            flex: 1;
            padding: 40px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            text-align: center;
        }

        .divider {
            width: 2px;
            background: rgba(255,255,255,0.3);
        }

        input {
            padding: 12px;
            font-size: 18px;
            width: 120px;
            border-radius: 8px;
            border: none;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .history {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .guess {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            margin: 5px 0;
            border-radius: 6px;
        }

        .disabled {
            opacity: 0.4;
        }
    </style>
</head>
<body>

<h2>🎯 Guess4Dig</h2>
<p id="status">Connecting...</p>

<div class="container">

    <div class="player" id="player1">
        <h3>Player 1</h3>
        <input type="text" id="input1" maxlength="4">
        <button onclick="sendGuess('input1')">Guess</button>
        <div class="history" id="history1"></div>
    </div>

    <div class="divider"></div>

    <div class="player" id="player2">
        <h3>Player 2</h3>
        <input type="text" id="input2" maxlength="4">
        <button onclick="sendGuess('input2')">Guess</button>
        <div class="history" id="history2"></div>
    </div>

</div>

<script>
    const socket = io();
    const status = document.getElementById("status");

    let player1Id = null;
    let player2Id = null;

    function setTurn(currentTurn) {
        if (socket.id === currentTurn) {
            status.innerText = "🔥 Your Turn";
            enableInputs(true);
        } else {
            status.innerText = "⏳ Opponent's Turn";
            enableInputs(false);
        }
    }

    function enableInputs(enable) {
        const isPlayer1 = socket.id === player1Id;

        document.getElementById("input1").disabled = !(enable && isPlayer1);
        document.getElementById("input2").disabled = !(enable && !isPlayer1);
    }

    socket.on("waiting", () => {
        status.innerText = "Waiting for second player...";
    });

    socket.on("startGame", (data) => {
        player1Id = data.player1;
        player2Id = data.player2;
        setTurn(data.currentTurn);
    });

    socket.on("guessResult", (data) => {
        const div = document.createElement("div");
        div.className = "guess";
        div.innerText = `${data.guess} → ${data.correctCount} correct`;

        if (data.player === player1Id) {
            document.getElementById("history1").appendChild(div);
        } else {
            document.getElementById("history2").appendChild(div);
        }
    });

    socket.on("turnChanged", (data) => {
        setTurn(data.currentTurn);
    });

    socket.on("gameOver", (data) => {
        if (data.winner === socket.id) {
            status.innerText = "🎉 You Win!";
        } else {
            status.innerText = "😢 You Lose!";
        }
        enableInputs(false);
    });

    function sendGuess(inputId) {
        const input = document.getElementById(inputId);
        const guess = input.value;

        if (!/^\d{4}$/.test(guess)) {
            alert("Enter valid 4-digit number");
            return;
        }

        socket.emit("makeGuess", { guess });
        input.value = "";
    }
</script>

</body>
</html>
