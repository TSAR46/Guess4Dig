<!DOCTYPE html>
<html>
<head>
    <title>Turn-Based Guess Game</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        h2 { text-align: center; margin-top: 20px; }
        #status { text-align: center; margin-bottom: 20px; font-weight: bold; }

        .container { flex: 1; display: flex; }

        .player {
            flex: 1;
            padding: 40px;
            text-align: center;
        }

        .divider {
            width: 3px;
            background: black;
        }

        input { padding: 10px; font-size: 18px; width: 120px; text-align: center; }
        button { padding: 10px 20px; margin-left: 10px; cursor: pointer; }

        .disabled { opacity: 0.4; }

        .history { margin-top: 20px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>

<h2>Turn-Based 4 Digit Guess Game</h2>
<p id="status">Connecting...</p>

<div class="container">

    <div class="player" id="player1">
        <h3>Player 1</h3>
        <input type="text" id="input1" maxlength="4">
        <button onclick="sendGuess('input1')">Submit</button>
        <div class="history" id="history1"></div>
    </div>

    <div class="divider"></div>

    <div class="player" id="player2">
        <h3>Player 2</h3>
        <input type="text" id="input2" maxlength="4">
        <button onclick="sendGuess('input2')">Submit</button>
        <div class="history" id="history2"></div>
    </div>

</div>

<script>
    const socket = io();
    const status = document.getElementById("status");

    let player1Id = null;
    let player2Id = null;

    function setTurn(currentTurn) {
        if (socket.id === currentTurn) {
            status.innerText = "Your Turn";
            enableMySide(true);
        } else {
            status.innerText = "Opponent's Turn";
            enableMySide(false);
        }
    }

    function enableMySide(enable) {
        const isPlayer1 = socket.id === player1Id;

        const input1 = document.getElementById("input1");
        const input2 = document.getElementById("input2");

        input1.disabled = !enable || !isPlayer1;
        input2.disabled = !enable || isPlayer1;

        document.getElementById("player1").classList.toggle("disabled", !isPlayer1 && enable);
        document.getElementById("player2").classList.toggle("disabled", isPlayer1 && enable);
    }

    socket.on("waiting", () => {
        status.innerText = "Waiting for second player...";
    });

    socket.on("startGame", (data) => {
        player1Id = data.player1;
        player2Id = data.player2;
        setTurn(data.currentTurn);
    });

    socket.on("guessResult", (data) => {
        const message = `Guessed ${data.guess} → ${data.correctCount} correct`;

        const div1 = document.createElement("div");
        div1.innerText = message;

        const div2 = document.createElement("div");
        div2.innerText = message;

        document.getElementById("history1").appendChild(div1);
        document.getElementById("history2").appendChild(div2);
    });

    socket.on("turnChanged", (data) => {
        setTurn(data.currentTurn);
    });

    socket.on("gameOver", (data) => {
        if (data.winner === socket.id) {
            status.innerText = "🎉 You Win!";
        } else {
            status.innerText = "😢 You Lose!";
        }
        enableMySide(false);
    });

    function sendGuess(inputId) {
        const input = document.getElementById(inputId);
        const guess = input.value;

        if (!/^\d{4}$/.test(guess)) {
            alert("Enter valid 4-digit number");
            return;
        }

        socket.emit("makeGuess", { guess });
        input.value = "";
    }
</script>

</body>
</html>
